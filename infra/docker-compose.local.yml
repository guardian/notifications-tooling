services:
  postgres:
    image: postgres:alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-notifications}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-notifications}
      POSTGRES_DB: ${POSTGRES_DB:-notifications}
    ports:
      - "5432:5432"
    volumes:
      - ./docker/postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-notifications} -d ${POSTGRES_DB:-notifications}"]
      interval: 10s
      timeout: 5s
      retries: 5
