pre-push:
  parallel: true
  commands:
    pinned-deps:
      glob: '**/package.json'
      run: bun run scripts/check-pinned-deps.ts
    lint:
      glob: '*.{js,ts,cjs,mjs,jsx,tsx}'
      run: bunx eslint --no-warn-ignored {push_files}
    format:
      glob: '*.{js,ts,cjs,mjs,jsx,tsx,json,jsonc,css,md}'
      run: bunx prettier --check {push_files}
    typecheck:
      glob: '**/*.{ts,tsx}'
      run: bun run typecheck

# Runs after `git pull`/`git merge`. Keep dependencies in sync automatically,
# but only when the merge actually touched the lockfile or a package.json.
post-merge:
  commands:
    install:
      glob: '{bun.lock,**/package.json}'
      run: bun install
